<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Computational Theory Tools</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        font-family: 'Segoe UI', sans-serif;
    }

    .menu {
        width: 420px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .menu-item {
        margin: 14px 0;
        padding: 16px 22px;
        border-radius: 14px;
        color: white;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .menu-item span {
        font-size: 22px;
    }

    .menu-item:hover {
        transform: translateX(10px) scale(1.03);
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    /* Different colors */
    .dfa { background: linear-gradient(135deg, #36d1dc, #5b86e5); }
    .nfa { background: linear-gradient(135deg, #f7971e, #ffd200); }
    .tm  { background: linear-gradient(135deg, #ff512f, #dd2476); }
    .compare { background: linear-gradient(135deg, #11998e, #38ef7d); }
    .min { background: linear-gradient(135deg, #7f00ff, #e100ff); }

</style>
</head>

<body>

<div class="menu">
    <div class="menu-item dfa">
        DFA
        <span>⚙️</span>
    </div>

    <div class="menu-item nfa">
        NFA
        <span>🔀</span>
    </div>

    <div class="menu-item tm">
        Turing Machine Simulator
        <span>🧠</span>
    </div>

    <div class="menu-item compare">
        Comparison of Computational Model
        <span>📊</span>
    </div>

    <div class="menu-item min">
        DFA Minimization Tool
        <span>✂️</span>
    </div>
</div>

</body>
</html>
